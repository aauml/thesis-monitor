<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thesis Knowledge Base</title>
<style>

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: #fafaf8;
    color: #111;
    min-height: 100vh;
  }
  a { color: #1E40AF; text-decoration: none; }
  a:hover { text-decoration: underline; }
  button { font-family: inherit; cursor: pointer; }
  .container { max-width: 1120px; margin: 0 auto; padding: 0 16px; }

  header {
    border-bottom: 1px solid #d1d5db;
    padding: 18px 0 12px;
    margin-bottom: 4px;
  }
  .header-top {
    display: flex; justify-content: space-between; align-items: baseline;
    gap: 12px; margin-bottom: 2px;
  }
  h1 {
    font-family: Georgia, serif;
    font-size: 23px;
    font-weight: 400;
    letter-spacing: -.3px;
  }
  .header-sub {
    font-family: Georgia, serif;
    font-size: 12px;
    color: #6B7280;
    font-style: italic;
    margin-bottom: 8px;
  }
  .header-stats {
    display: flex; gap: 10px; font-size: 12px; color: #6B7280;
    flex-wrap: wrap; align-items: center;
  }
  .header-stats strong { color: #111; }
  .refresh-area { display: flex; gap: 10px; align-items: center; flex-shrink: 0; }
  .last-fetch { font-size: 11px; color: #9CA3AF; }
  .btn-refresh {
    font-size: 12px; font-weight: 600; color: #1E40AF;
    background: none; border: none; padding: 0; white-space: nowrap;
  }
  .btn-refresh:disabled { color: #9CA3AF; cursor: default; }

  .controls-section {
    position: sticky;
    top: 0;
    z-index: 20;
    background: rgba(250,250,248,.94);
    backdrop-filter: blur(4px);
    padding-top: 6px;
    border-bottom: 1px solid #ececec;
  }
  .controls-row1, .controls-row2, .controls-row3 {
    display: flex; flex-wrap: wrap; gap: 6px; align-items: center;
    margin-bottom: 6px;
  }
  .controls-row3 { padding-bottom: 6px; }
  .ctrl-sep { width: 1px; height: 16px; background: #ececec; margin: 0 2px; flex-shrink: 0; }

  .btn-imp, .btn-capa, .btn-star-filter, .btn-clear-all, .btn-search, select {
    min-height: 28px;
    border: 1px solid transparent;
    border-radius: 8px;
    background: transparent;
    color: #4b5563;
    font-size: 11px;
    line-height: 1;
    box-shadow: none;
  }

  .btn-imp, .btn-capa {
    padding: 0 8px;
    font-weight: 500;
    display: inline-flex; align-items: center; gap: 6px;
  }
  .btn-imp .btn-count {
    font-size: 10px; color: #9CA3AF; font-weight: 400;
  }
  .btn-imp:hover, .btn-capa:hover, .btn-star-filter:hover, .btn-clear-all:hover, select:hover {
    background: #f3f4f6;
    color: #111827;
  }
  .btn-imp.active-ALTA { background: #fef2f2; border-color: #fecaca; color: #991b1b; }
  .btn-imp.active-MEDIA { background: #fffbeb; border-color: #fde68a; color: #92400e; }
  .btn-imp.active-BAJA { background: #f3f4f6; border-color: #e5e7eb; color: #374151; }
  .btn-imp.active-ALTA .btn-count,
  .btn-imp.active-MEDIA .btn-count,
  .btn-imp.active-BAJA .btn-count { color: inherit; opacity: .7; }

  .btn-star-filter {
    padding: 0 8px; font-size: 12px; font-weight: 600; color: #9CA3AF;
  }
  .btn-star-filter.active { background: #fff7ed; border-color: #fed7aa; color: #c2410c; }

  .btn-capa.active-teorica { background: #eff6ff; border-color: #bfdbfe; color: #1d4ed8; }
  .btn-capa.active-analitica { background: #f0fdf4; border-color: #bbf7d0; color: #166534; }
  .btn-capa.active-evaluativa { background: #faf5ff; border-color: #e9d5ff; color: #7e22ce; }
  .btn-capa.active-metodologica { background: #f0fdfa; border-color: #99f6e4; color: #0f766e; }

  select {
    padding: 0 8px; font-family: inherit; cursor: pointer;
    max-width: 142px;
    color: #6b7280;
  }
  select.filter-active { background: #f3f4f6; border-color: #e5e7eb; color: #111; font-weight: 500; }

  .search-wrap {
    position: relative; display: flex; align-items: center;
    flex: 1; min-width: 180px; max-width: 240px;
  }
  .search-wrap input[type=text] {
    width: 100%; height: 28px; padding: 0 26px 0 10px;
    font-size: 12px; border: 1px solid #e5e7eb; border-radius: 8px;
    background: #fff; font-family: inherit;
  }
  .search-wrap input[type=text]:focus, select:focus {
    outline: none;
    border-color: #cbd5e1;
  }
  .btn-clear-x {
    position: absolute; right: 8px; background: none; border: none;
    font-size: 12px; color: #9CA3AF; line-height: 1; padding: 0;
    cursor: pointer; display: none;
  }
  .btn-search {
    padding: 0 10px; font-weight: 500; border-color: #e5e7eb;
    background: #fff; color: #374151; white-space: nowrap;
  }
  .btn-search:hover { border-color: #d1d5db; }
  .btn-clear-all {
    background: transparent; color: #9CA3AF; padding: 0 8px; display: none; white-space: nowrap;
  }

  .meta-row {
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 0 2px; font-size: 11px; color: #9CA3AF; flex-wrap: wrap; gap: 6px;
  }
  .btn-export {
    font-size: 11px; color: #6B7280; background: none;
    border: 1px solid #d1d5db; border-radius: 999px; padding: 5px 10px;
  }

  main { padding: 6px 0 80px; }

  article {
    background: #fff; border: 1px solid #e5e7eb; border-radius: 12px;
    padding: 9px 12px; margin-bottom: 8px; cursor: pointer; position: relative;
    transition: border-color .12s ease, background-color .12s ease;
  }
  article:hover { border-color: #cbd5e1; }

  .card-shell {
    display: grid;
    grid-template-columns: minmax(0, 1fr) 360px;
    gap: 16px;
    align-items: start;
  }

  .card-left { min-width: 0; }
  .card-right {
    border-left: 1px solid #f0f1f3;
    padding-left: 14px;
    display: none;
  }
  article.expanded .card-right { display: block; }

  .card-meta {
    display: flex; flex-wrap: wrap; align-items: center; gap: 0;
    margin-bottom: 4px; font-size: 11px; line-height: 1.6;
  }
  .card-imp {
    display: inline-flex; align-items: center; padding: 2px 7px;
    border-radius: 999px; font-size: 10px; font-weight: 700;
    letter-spacing: .06em; text-transform: uppercase; line-height: 1.5;
    margin-right: 6px; flex-shrink: 0;
  }
  .imp-ALTA { background: #DC2626; color: #fff; }
  .imp-MEDIA { background: #D97706; color: #fff; }
  .imp-BAJA { background: #6B7280; color: #fff; }

  .meta-sep { color: #d1d5db; padding: 0 4px; user-select: none; }
  .meta-capa-teorica { color: #1E40AF; font-weight: 600; }
  .meta-capa-analitica { color: #166534; font-weight: 600; }
  .meta-capa-evaluativa { color: #6B21A8; font-weight: 600; }
  .meta-capa-metodologica { color: #0f766e; font-weight: 600; }
  .meta-capa-detail, .meta-type, .meta-tier { color: #6B7280; }
  .meta-evaluativa { color: #6B21A8; font-style: italic; }
  .meta-action { font-weight: 600; color: #b45309; }

  .btn-star {
    background: none; border: none; padding: 0; font-size: 13px; line-height: 1;
    color: #d1d5db; cursor: pointer; display: inline-flex; align-items: center;
    margin-right: 6px; flex-shrink: 0; transition: color .1s, transform .1s;
    user-select: none;
  }
  .btn-star:hover { color: #f59e0b; transform: scale(1.08); }
  .btn-star.starred { color: #f59e0b; }
  .btn-star.saving { opacity: .4; pointer-events: none; }

  .card-title {
    font-size: 14px; font-weight: 650; line-height: 1.35;
    margin: 0 0 4px; color: #111827;
  }
  .card-byline {
    font-size: 11px; color: #9CA3AF; display: flex; gap: 0;
    flex-wrap: wrap; align-items: center;
  }
  .card-byline .scholar { color: #6B7280; font-weight: 500; }
  .card-byline .lang { text-transform: uppercase; font-weight: 600; font-size: 10px; }

  .preview-line {
    margin-top: 6px;
    font-size: 12px;
    line-height: 1.55;
    color: #4b5563;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .detail-meta {
    display: flex; flex-wrap: wrap; gap: 6px;
    margin-bottom: 8px;
  }
  .detail-pill {
    font-size: 10px;
    color: #475569;
    background: #f8fafc;
    border: 1px solid #e2e8f0;
    border-radius: 999px;
    padding: 4px 8px;
  }
  .detail-sec {
    margin-bottom: 10px;
  }
  .detail-label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: .08em;
    color: #1E40AF;
    font-weight: 700;
    margin-bottom: 4px;
  }
  .detail-sec p {
    font-size: 12px;
    line-height: 1.55;
    color: #374151;
    margin: 0;
  }
  .detail-sec.thesis p {
    color: #111827;
    font-weight: 500;
  }
  .detail-actions {
    display: flex; flex-wrap: wrap; gap: 6px;
    padding-top: 2px;
  }
  .mini-btn {
    font-size: 11px;
    color: #1E40AF;
    background: #fff;
    border: 1px solid #d1d5db;
    border-radius: 999px;
    padding: 5px 9px;
  }

  .pagination {
    display: flex; gap: 5px; justify-content: center; padding: 18px 0 0;
    align-items: center; flex-wrap: wrap;
  }
  .btn-page {
    padding: 6px 10px; font-size: 12px; border: 1px solid #d1d5db;
    border-radius: 999px; background: #fff; color: #374151; min-height: 32px;
  }
  .btn-page.current {
    background: #1E40AF; border-color: #1E40AF; color: #fff; font-weight: 600; cursor: default;
  }
  .btn-page:disabled { color: #d1d5db; background: #f9fafb; cursor: default; }
  .ellipsis { font-size: 12px; color: #9CA3AF; padding: 0 2px; }

  .state-msg {
    text-align: center; padding: 60px 0; color: #9CA3AF; font-size: 14px;
  }
  .error-box {
    margin-top: 24px; padding: 14px 16px; background: #fef2f2; border: 1px solid #fecaca;
    border-radius: 10px; font-size: 13px; color: #991b1b; line-height: 1.6;
  }

  @media (max-width: 900px) {
    .container { max-width: 820px; }
    .card-shell { grid-template-columns: 1fr; }
    .card-right { border-left: none; border-top: 1px solid #f0f1f3; padding-left: 0; padding-top: 10px; margin-top: 10px; }
  }
  @media (max-width: 480px) {
    h1 { font-size: 18px; }
    .last-fetch { display: none; }
    .controls-row1, .controls-row2 {
      gap: 4px; flex-wrap: nowrap; overflow-x: auto; -webkit-overflow-scrolling: touch; padding-bottom: 2px;
    }
    .btn-imp, .btn-capa {
      padding: 0 8px; font-size: 10px; min-height: 28px; flex-shrink: 0;
    }
    .btn-imp .btn-count, .btn-capa .btn-count { display: none; }
    .ctrl-sep { display: none; }
    .controls-row3 { gap: 4px; }
    select { max-width: none; flex: 1 1 auto; min-width: 0; font-size: 11px; }
    .search-wrap { flex: 1 1 100%; max-width: none; }
    .btn-search { flex-shrink: 0; }
    .card-title { font-size: 14px; }
  }
</style>

<script>
function renderCard(item, id) {
  const imp    = item.importance || "BAJA";
  const isOpen = expandedIds.has(id);
  const isStarred = item.starred == 1 || item.starred === "1" || item.starred === "true" || item.starred === "yes";
  const starBtnId = "star-" + id;
  const urlEscaped = (item.url || "").replace(/'/g, "\\'");

  const metaParts = [];
  const starBtn = `<button
    class="btn-star${isStarred ? " starred" : ""}"
    id="${starBtnId}"
    title="${isStarred ? "Unstar" : "Star"}"
    onclick="toggleStar(event, '${urlEscaped}', '${starBtnId}')"
  >★</button>`;

  const capaRaw = (item.capa || "").toLowerCase();
  const capaClass = capaRaw.includes("teór") || capaRaw.includes("teor")   ? "meta-capa-teorica"
                  : capaRaw.includes("analí") || capaRaw.includes("anali") ? "meta-capa-analitica"
                  : capaRaw.includes("eval")                                ? "meta-capa-evaluativa"
                  : capaRaw.includes("metod")                               ? "meta-capa-metodologica" : "";
  const capaLabel = capaRaw.includes("teór") || capaRaw.includes("teor")   ? "Teórica"
                  : capaRaw.includes("analí") || capaRaw.includes("anali") ? "Analítica"
                  : capaRaw.includes("eval")                                ? "Evaluativa"
                  : capaRaw.includes("metod")                               ? "Metodológica"
                  : item.capa || "";

  if (capaLabel) metaParts.push(`<span class="${capaClass}">${capaLabel}</span>`);
  if (item.capa_detail) metaParts.push(`<span class="meta-capa-detail">${item.capa_detail}</span>`);
  if (item.evaluativa_criteria) metaParts.push(`<span class="meta-evaluativa">${item.evaluativa_criteria}</span>`);
  const ACT = { REFERENCE: "Reference", CONTEXT: "Context", "FOLLOW-UP": "Follow-up", URGENT: "Urgent" };
  if (item.action_tag) metaParts.push(`<span class="meta-action">${ACT[item.action_tag] || item.action_tag}</span>`);
  if (item.content_type) metaParts.push(`<span class="meta-type">${item.content_type}</span>`);
  const tier = String(item.tier || "").trim();
  if (tier) metaParts.push(`<span class="meta-tier">T${tier}</span>`);
  const metaLine = metaParts.map((part, i) => i === 0 ? part : `<span class="meta-sep">·</span>${part}`).join("");

  const bylineParts = [
    item.source || "",
    item.date_published ? formatDate(item.date_published) : "",
    item.scholar ? `<span class="scholar">${item.scholar}</span>` : "",
    item.language && item.language !== "en" ? `<span class="lang">${item.language}</span>` : "",
  ].filter(Boolean);
  const byline = bylineParts.join('<span class="meta-sep">·</span>');

  const paras = (item.thesis_relevance || "").split(/\n\n+/).filter(p => p.trim());
  const p1 = paras[0] ? `<div class="detail-sec"><div class="detail-label">Context</div><p>${paras[0]}</p></div>` : "";
  const p2 = paras[1] ? `<div class="detail-sec"><div class="detail-label">Source</div><p>${paras[1]}</p></div>` : "";
  const p3 = paras[2] ? `<div class="detail-sec thesis"><div class="detail-label">Thesis</div><p>${paras[2]}</p></div>` : "";
  const previewText = paras[0] || "";
  const preview = previewText ? `<div class="preview-line">${previewText}</div>` : "";

  const pills = [
    item.search_scope ? `<span class="detail-pill">${item.search_scope}</span>` : "",
    item.folder ? `<span class="detail-pill">${item.folder}</span>` : "",
    item.run_id ? `<span class="detail-pill">Run ${item.run_id}</span>` : "",
  ].filter(Boolean).join("");

  const link = item.url
    ? `<a class="mini-btn" href="${item.url}" target="_blank" rel="noopener" onclick="event.stopPropagation()">Open source</a>`
    : "";

  return `
    <article class="${isOpen ? 'expanded' : ''}" onclick="toggleCard('${id}')">
      <div class="card-shell">
        <div class="card-left">
          <div class="card-meta">
            ${starBtn}<span class="card-imp imp-${imp}">${({ALTA:"ALTA", MEDIA:"MEDIA", BAJA:"BAJA"})[imp] || imp}</span>${metaLine}
          </div>
          <h2 class="card-title">${item.title || "(no title)"}</h2>
          <div class="card-byline">${byline}</div>
          ${preview}
        </div>

        <div class="card-right">
          <div class="detail-meta">${pills}</div>
          ${p1}
          ${p2}
          ${p3}
          <div class="detail-actions">
            ${link}
          </div>
        </div>
      </div>
    </article>`;
}
</script>
